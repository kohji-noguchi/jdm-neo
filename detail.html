<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JDMLures Detail</title>

<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="detail.css">

<!-- favicon -->
<link rel="apple-touch-icon" sizes="180x180" href="../img/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="../img/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="../img/favicon-16x16.png">
<link rel="manifest" href="/site.webmanifest">

<!-- PayPal SDK -->
<script src="https://www.paypal.com/sdk/js?client-id=sb&currency=USD&locale=en_US"></script>

</head>

<body>

<!-- Header -->
<div class="top-bar">
  <div class="top-inner">
    <img src="https://upload.wikimedia.org/wikipedia/en/9/9e/Flag_of_Japan.svg" class="flag" alt="Japan Flag">
    <span id="japan-time"></span>
  </div>
</div>

<section class="section logo-section">
  <img src="img/index/logo.webp" alt="JDMLures Logo">
</section>

<!-- Detail Title & Top Price -->
<section class="section">
  <div class="container">
    <h2 id="detail-title">Loading...</h2>
    <p class="price-text" id="detail-price">$0</p>
    <div id="paypal-button-container-top" class="paypal-wrapper"></div>
    <p id="detail-desc">Loading...</p>
  </div>
</section>

<!-- Hero -->
<section class="section hero">
  <div class="container">
    <img id="detail-hero-img" src="../img/hero/sample-hero.jpg" alt="Product Hero">
    <p class="image-caption" id="hero-caption">Sample Hero Caption</p>
  </div>
</section>

<!-- Additional Shots -->
<section class="section" id="additional-images">
</section>

<!-- Payment Section Bottom -->
<section class="section back-section">
  <div class="container">
    <p class="price-text" id="detail-price-bottom">$0</p>
    <div id="paypal-button-container-bottom" class="paypal-wrapper"></div>
    <a href="../index.html" class="back-button">BACK</a>
  </div>
</section>

<!-- Footer -->
<footer class="footer">
  <p>© 2026 JDM Lures All Rights Reserved.</p>
  <nav>
    <a href="../policy/policy.html">Refund Policy</a> |
    <a href="../policy/policy.html">Terms of Service</a> |
    <a href="../policy/policy.html">Privacy Policy</a>
  </nav>
</footer>

<!-- Detail JS -->
<script src="detail.js"></script>

<!-- HTML内PayPalボタン（消さない） -->
<script>
  // Top Button
  paypal.Buttons({
    style: { layout: 'vertical', label: 'paypal' }, 
    createOrder: function(data, actions) {
      return actions.order.create({
        purchase_units: [{ amount: { value: '10' } }]
      });
    },
    onApprove: function(data, actions) {
      return actions.order.capture().then(function(details) {
        alert('Transaction completed by ' + details.payer.name.given_name);
      });
    }
  }).render('#paypal-button-container-top');

  // Bottom Button
  paypal.Buttons({
    style: { layout: 'vertical', label: 'paypal' },
    createOrder: function(data, actions) {
      return actions.order.create({
        purchase_units: [{ amount: { value: '10' } }]
      });
    },
    onApprove: function(data, actions) {
      return actions.order.capture().then(function(details) {
        alert('Transaction completed by ' + details.payer.name.given_name);
      });
    }
  }).render('#paypal-button-container-bottom');
</script>

</body>
</html>
