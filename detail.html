<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JDMLures Detail</title>

<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="detail.css">

<!-- favicon -->
<link rel="apple-touch-icon" sizes="180x180" href="../img/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="../img/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="../img/favicon-16x16.png">
<link rel="manifest" href="/site.webmanifest">

<!-- 本番用　PayPal SDK -->
<!-- <script src="https://www.paypal.com/sdk/js?client-id=ATPf9JYiBbX0M034sH87U2yChqPFo-30PhTPUhYgP3m4U_1AjV7tQ-MkbVCx2LoN2LBmD9vc5IsjIi1C&currency=USD&locale=en_US"></script> -->


<!-- テスト用　PayPal SDK -->
<script src="https://www.paypal.com/sdk/js?client-id=sb&currency=USD&locale=en_US"></script>

<style>
  /* 最小限でボタンが崩れないようにする */
  .price-text {
    font-size: 1.4rem;
    font-weight: bold;
    margin-bottom: 6px;
  }
  .paypal-wrapper {
    display: block;
  }
</style>
</head>

<body>

<!-- Header -->
<div class="top-bar">
  <div class="top-inner">
    <img src="https://upload.wikimedia.org/wikipedia/en/9/9e/Flag_of_Japan.svg" class="flag" alt="Japan Flag">
    <span id="japan-time"></span>
  </div>
</div>

<section class="section logo-section">
  <img src="img/index/logo.webp" alt="JDMLures Logo">
</section>

<!-- Detail Title & Top Price -->
<section class="section">
  <div class="container">
    <h2 id="detail-title">Sample Product</h2>

    <p class="price-text">$0</p>
    <div id="paypal-button-container-top" class="paypal-wrapper"></div>

    <p id="detail-desc">This is a sample product description.</p>
  </div>
</section>

<!-- Hero -->
<section class="section hero">
  <div class="container">
    <img id="detail-hero-img" src="../img/hero/sample-hero.jpg" alt="Product Hero">
    <p class="image-caption" id="hero-caption">Sample Hero Caption</p>
  </div>
</section>

<!-- Additional Shots -->
<section class="section">
  <div class="container">
    <img id="detail-img-1" src="../img/detail/sample1.jpg" alt="Front Angle">
    <p class="image-caption">Front Angle View</p>
  </div>
</section>

<section class="section">
  <div class="container">
    <img id="detail-img-2" src="../img/detail/sample2.jpg" alt="Side Angle">
    <p class="image-caption">Side Angle View</p>
  </div>
</section>

<section class="section">
  <div class="container">
    <img id="detail-img-3" src="../img/detail/sample3.jpg" alt="Rear Angle">
    <p class="image-caption">Rear Angle View</p>
  </div>
</section>

<!-- Payment Section Bottom -->
<section class="section back-section">
  <div class="container">
    <p class="price-text">$0</p>
    <div id="paypal-button-container-bottom" class="paypal-wrapper"></div>

    <a href="../index.html" class="back-button">BACK</a>
  </div>
</section>

<!-- Footer -->
<footer class="footer">
  <p>© 2026 JDM Lures All Rights Reserved.</p>
  <nav>
    <a href="../policy/policy.html">Refund Policy</a> |
    <a href="../policy/policy.html">Terms of Service</a> |
    <a href="../policy/policy.html">Privacy Policy</a>
  </nav>
</footer>

<!-- PayPal Buttons Script -->
<script>
  // Top Button
  paypal.Buttons({
    style: { layout: 'vertical', label: 'paypal' }, // verticalで安定
    createOrder: function(data, actions) {
      return actions.order.create({
        purchase_units: [{ amount: { value: '10' } }]
      });
    },
    onApprove: function(data, actions) {
      return actions.order.capture().then(function(details) {
        alert('Transaction completed by ' + details.payer.name.given_name);
      });
    }
  }).render('#paypal-button-container-top');

  // Bottom Button
  paypal.Buttons({
    style: { layout: 'vertical', label: 'paypal' },
    createOrder: function(data, actions) {
      return actions.order.create({
        purchase_units: [{ amount: { value: '10' } }]
      });
    },
    onApprove: function(data, actions) {
      return actions.order.capture().then(function(details) {
        alert('Transaction completed by ' + details.payer.name.given_name);
      });
    }
  }).render('#paypal-button-container-bottom');
</script>

<script src="../js/main.js"></script>
<script src="detail.js"></script>
</body>
</html>
